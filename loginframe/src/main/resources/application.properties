spring.application.name=loginframe

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/isopro
spring.datasource.username=root
spring.datasource.password=Akshay0987@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Upload folder
file.upload-dir=${user.home}/iso-uploads

# Multipart (Spring)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# ? IMPORTANT: Tomcat "too many parts" fix (this solves FileCountLimitExceededException)
server.tomcat.max-part-count=200

# Optional: if you upload larger files / many files
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=50MB